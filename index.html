                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5a2 2 0 10-2 2h2zm-2 4h4M5 8h14a2 2 0 012 2v3a7 7 0 01-7 7H10a7 7 0 01-7-7v-3a2 2 0 012-2z"></path>
                </svg>

        // Unique dynamic question generator for Directed Numbers
        function generateQuestion(mode) {
            let num1 = 0;
            let num2 = 0;
            let op = '+';
            let expressionStr = '';
            let val = 0;
            let explanation = '';
            let type = '';

            if (mode === 'octopus') {
                const isPositive = Math.random() > 0.5;
                if (isPositive) {
                    num1 = Math.floor(Math.random() * 8) + 2; 
                    num2 = Math.floor(Math.random() * 8) + 2; 
                    op = '+';
                    val = num1 + num2;
                    expressionStr = `${num1} + ${num2}`;
                    explanation = `增值 $${num1}，再增值 $${num2}。同方向增加：累計得到 $${val}。`;
                } else {
                    num1 = -(Math.floor(Math.random() * 8) + 2); 
                    num2 = Math.floor(Math.random() * 8) + 2; 
                    op = '-';
                    val = num1 - num2;
                    expressionStr = `${num1} - ${num2}`;
                    explanation = `欠款 $${Math.abs(num1)}（記為 ${num1}），再扣減 $${num2}。同向扣減：累計為 ${val}。`;
                }
                type = 'octopus';
            } else {
                const template = Math.floor(Math.random() * 4);
                num1 = Math.floor(Math.random() * 11) - 5; 
                if (num1 === 0) num1 = 3; 
                num2 = Math.floor(Math.random() * 8) + 2; 

                switch (template) {
                    case 0: // a + (-b)
                        val = num1 - num2;
                        expressionStr = `${num1} + (-${num2})`;
                        explanation = `正負得負：${num1} + (-${num2}) 簡化為 ${num1} - ${num2} = ${val}。`;
                        break;
                    case 1: // a - (-b)
                        val = num1 + num2;
                        expressionStr = `${num1} - (-${num2})`;
                        explanation = `負負得正：${num1} - (-${num2}) 簡化為 ${num1} + ${num2} = ${val}。`;
                        break;
                    case 2: // -a + b
                        num1 = -Math.abs(num1);
                        val = num1 + num2;
                        expressionStr = `(${num1}) + ${num2}`;
                        explanation = `從 ${num1} 開始，向右移動 ${num2} 格。結果為 ${val}。`;
                        break;
                    case 3: // -a - (+b)
                        num1 = -Math.abs(num1);
                        val = num1 - num2;
                        expressionStr = `(${num1}) - (+${num2})`;
                        explanation = `正負得負：${num1} - (+${num2}) 簡化為 ${num1} - ${num2} = ${val}。`;
                        break;
                }
                type = 'directed';
            }

            let rawSum = Math.abs(num1) + Math.abs(num2);
            let rawDiff = Math.abs(Math.abs(num1) - Math.abs(num2));
            
            const optionsSet = new Set();
            optionsSet.add(val);
            optionsSet.add(rawSum);
            optionsSet.add(-rawSum);
            optionsSet.add(rawDiff);
            optionsSet.add(-rawDiff);

            let safetyOffset = 1;
            while (optionsSet.size < 4) {
                optionsSet.add(val + safetyOffset);
                optionsSet.add(val - safetyOffset);
                safetyOffset++;
            }

            const options = Array.from(optionsSet).slice(0, 4);
            options.sort(() => Math.random() - 0.5);

            return {
                num1,
                num2,
                op,
                expression: expressionStr,
                answer: val,
                options,
                explanation,
                type
            };
        }

        // --- DYNAMIC VISUAL COMPONENT (SAFEGUARDED AGAINST NULL REFERENCES) ---
        const VisualAid = ({ question, showAnswer }) => {
            if (!question) return null;

            if (question.type === 'octopus') {
                const total = question.answer;
                return (
                    <div className="flex flex-col items-center justify-center bg-orange-50 border-4 border-dashed border-orange-300 rounded-2xl p-4 w-full h-full min-h-[130px]">
                        <div className="flex items-center gap-3 mb-1">
                            <SVG.OctopusCard />
                            <div className="text-left">
                                <p className="text-sm font-black text-orange-600">八達通模擬系統</p>
                                <p className="text-lg font-extrabold text-slate-800">交易式同號累積</p>
                            </div>
                        </div>
                        <div className="flex justify-around items-center w-full max-w-md mt-1 text-sm">
                            <div className="text-center bg-white p-2 rounded-xl shadow-md border-2 border-slate-300 min-w-[90px]">
                                <span className="block text-[10px] font-bold text-slate-500 mb-0.5">初始狀態</span>
                                <span className={`text-base font-black ${question.num1 >= 0 ? 'text-green-600' : 'text-red-600'}`}>
                                    {question.num1 >= 0 ? `+$${question.num1}` : `-$${Math.abs(question.num1)}`}
                                </span>
                            </div>
                            <div className="font-black text-slate-400 text-lg">➔</div>
                            <div className="text-center bg-white p-2 rounded-xl shadow-md border-2 border-slate-300 min-w-[90px]">
                                <span className="block text-[10px] font-bold text-slate-500 mb-0.5">交易操作</span>
                                <span className={`text-base font-black ${question.op === '+' ? 'text-green-600' : 'text-red-600'}`}>
                                    {question.op === '+' ? `+$${Math.abs(question.num2)}` : `-$${Math.abs(question.num2)}`}
                                </span>
                            </div>
                            <div className="font-black text-slate-400 text-lg">➔</div>
                            <div className="text-center bg-orange-100 p-2 rounded-xl shadow-inner border-2 border-orange-300 min-w-[90px]">
                                <span className="block text-[10px] font-bold text-orange-700 mb-0.5">最終餘額</span>
                                {showAnswer ? (
                                    <span className={`text-base font-black ${total >= 0 ? 'text-green-600' : 'text-red-600'}`}>
                                        {total >= 0 ? `+$${total}` : `-$${Math.abs(total)}`}
                                    </span>
                                ) : (
                                    <span className="text-sm font-black text-slate-500 animate-pulse bg-slate-200 px-2.5 py-0.5 rounded border border-slate-400">
                                        $ ?
                                    </span>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            // COMPACT NUMBER LINE VISUALIZATION (OPTIMIZED HEIGHT FOR CLASSROOM WHITEBOARDS)
            const maxVal = 10;
            const minVal = -10;
            const range = maxVal - minVal;

            const getX = (val) => {
                const percentage = (val - minVal) / range;
                return 40 + percentage * 720;
            };

            const startX = getX(0);
            const num1X = getX(question.num1);
            const answerX = getX(question.answer);

            const ticks = [];
            for (let i = minVal; i <= maxVal; i++) {
                ticks.push(i);
            }

            return (
                <div className="w-full bg-blue-50 border-4 border-dashed border-blue-300 rounded-2xl p-3 flex flex-col justify-center items-center overflow-x-auto min-h-[130px]">
                    <div className="text-xs font-black text-blue-700 mb-1">數線幾何對照演示</div>
                    <svg className="w-full min-w-[500px] max-w-[700px]" viewBox="0 0 800 100" xmlns="http://www.w3.org/2000/svg">
                        <line x1="30" y1="55" x2="770" y2="55" stroke="#1e293b" strokeWidth="3" strokeLinecap="round" />
                        <polygon points="770,51 780,55 770,59" fill="#1e293b" />
                        <polygon points="30,51 20,55 30,59" fill="#1e293b" />

                        {ticks.map((tick) => (
                            <g key={tick}>
                                <line x1={getX(tick)} y1="48" x2={getX(tick)} y2="62" stroke="#1e293b" strokeWidth="2" />
                                <text 
                                    x={getX(tick)} 
                                    y="80" 
                                    textAnchor="middle" 
                                    className={`text-[12px] font-black ${tick === 0 ? 'fill-slate-900 text-[14px]' : 'fill-slate-600'}`}
                                >
                                    {tick}
                                </text>
                                {tick === 0 && <circle cx={getX(tick)} cy="55" r="4" fill="#000000" />}
                            </g>
                        ))}

                        {question.num1 !== 0 && (
                            <g>
                                <path 
                                    d={`M ${startX} 55 Q ${(startX + num1X)/2} 24 ${num1X} 55`} 
                                    fill="none" 
                                    stroke="#ec4899" 
                                    strokeWidth="3.5" 
                                    strokeDasharray="4 4"
                                />
                                <polygon points={`${num1X},55 ${num1X - (num1X > startX ? 8 : -8)},47 ${num1X - (num1X > startX ? 4 : -4)},55`} fill="#ec4899" />
                                <text x={(startX + num1X)/2} y="16" textAnchor="middle" className="text-[12px] font-black fill-pink-600">
                                    {question.num1 > 0 ? `+${question.num1}` : question.num1}
                                </text>
                            </g>
                        )}

                        {num1X !== answerX && (
                            <g>
                                <path 
                                    d={`M ${num1X} 55 Q ${(num1X + answerX)/2} 10 ${answerX} 55`} 
                                    fill="none" 
                                    stroke={answerX > num1X ? '#059669' : '#dc2626'} 
                                    strokeWidth="4.5" 
                                />
                                <polygon 
                                    points={`${answerX},55 ${answerX - (answerX > num1X ? 9 : -9)},42 ${answerX - (answerX > num1X ? 4 : -4)},55`} 
                                    fill={answerX > num1X ? '#059669' : '#dc2626'} 
                                />
                                <text x={(num1X + answerX)/2} y="5" textAnchor="middle" className={`text-[12px] font-black ${answerX > num1X ? 'fill-emerald-700' : 'fill-red-700'}`}>
                                    {answerX > num1X ? '往右 ➔' : '往左 ➔'} ({question.answer - question.num1 > 0 ? `+${question.answer - question.num1}` : question.answer - question.num1})
                                </text>
                            </g>
                        )}

                        <circle cx={answerX} cy="55" r="6" fill="#2563eb" className="animate-pulse" />
                        <rect x={answerX - 14} y="85" width="28" height="13" rx="3" fill="#2563eb" />
                        <text x={answerX} y="94" textAnchor="middle" className="text-[9px] font-bold fill-white">落點</text>
                    </svg>
                </div>
            );
        };

        // --- TUG OF WAR SVG SIMULATION ---
        const TugOfWarSVG = ({ deltaScore }) => {
            const offset = deltaScore * 18;
            const centerPoint = 300 + offset;

            return (
                <div className="w-full max-w-md mx-auto bg-slate-800 rounded-xl p-2 border-2 border-slate-900 shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">
                    <div className="flex justify-between items-center text-[10px] font-bold text-slate-300 mb-0.5">
                        <span className="text-red-400">◀ 紅方拉力區</span>
                        <span className="bg-slate-700 px-2 py-0.5 rounded text-white font-black">
                            {deltaScore === 0 ? "勢均力敵" : deltaScore > 0 ? `紅領先 ${deltaScore}` : `藍領先 ${Math.abs(deltaScore)}`}
                        </span>
                        <span className="text-blue-400">藍方拉力區 ➔</span>
                    </div>
                    
                    <svg className="w-full h-[60px] bg-slate-950 rounded overflow-visible" viewBox="0 0 600 55" xmlns="http://www.w3.org/2000/svg">
                        <line x1="300" y1="0" x2="300" y2="55" stroke="#f43f5e" strokeWidth="1.5" strokeDasharray="3 3" opacity="0.3" />
                        <line x1="20" y1="28" x2="580" y2="28" stroke="#e2e8f0" strokeWidth="3" strokeLinecap="round" />

                        {/* Central red knot */}
                        <g transform={`translate(${centerPoint}, 28)`}>
                            <rect x="-6" y="-10" width="12" height="20" fill="#e11d48" rx="1.5" className="animate-pulse" />
                            <polygon points="-5,-6 0,-10 5,-6 0,10" fill="#facc15" />
                        </g>

                        {/* 4 Red Stickmen */}
                        {[60, 100, 140, 180].map((dist, i) => (
                            <g key={`red-${i}`} transform={`translate(${centerPoint - dist}, 28)`} className="transition-transform duration-300">
                                <line x1="12" y1="0" x2="24" y2="-12" stroke="#ef4444" strokeWidth="2.5" />
                                <circle cx="28" cy="-16" r="6" fill="#ef4444" />
                                <line x1="18" y1="-5" x2="65" y2="0" stroke="#ef4444" strokeWidth="2.5" />
                                <line x1="12" y1="0" x2="0" y2="16" stroke="#ef4444" strokeWidth="3" />
                            </g>
                        ))}

                        {/* 4 Blue Stickmen */}
                        {[60, 100, 140, 180].map((dist, i) => (
                            <g key={`blue-${i}`} transform={`translate(${centerPoint + dist}, 28) scale(-1, 1)`} className="transition-transform duration-300">
                                <line x1="12" y1="0" x2="24" y2="-12" stroke="#3b82f6" strokeWidth="2.5" />
                                <circle cx="28" cy="-16" r="6" fill="#3b82f6" />
                                <line x1="18" y1="-5" x2="65" y2="0" stroke="#3b82f6" strokeWidth="2.5" />
                                <line x1="12" y1="0" x2="0" y2="16" stroke="#3b82f6" strokeWidth="3" />
                            </g>
                        ))}
                    </svg>
                </div>
            );
        };

        // --- MAIN APP COMPONENT ---
        function App() {
            const [view, setView] = useState('menu');
            const [currentMode, setCurrentMode] = useState('octopus'); // 'octopus' | 'directed'
            
            // Game State (Single Player)
            const [currentQuestion, setCurrentQuestion] = useState(null);
            const [questionIndex, setQuestionIndex] = useState(1);
            const [singleScore, setSingleScore] = useState(0);
            const [isAnswered, setIsAnswered] = useState(false);
            const [selectedChoice, setSelectedChoice] = useState(null);
            const [wrongQuestions, setWrongQuestions] = useState([]);
            const [streak, setStreak] = useState(0);
            const [showHint, setShowHint] = useState(false);
            
            // Stats trackers for Infinite Mode
            const [totalAnswered, setTotalAnswered] = useState(0);
            const [correctCount, setCorrectCount] = useState(0);

            // Dual Player Game State
            const [dualScore, setDualScore] = useState(0); 
            const [dualRound, setDualRound] = useState(1);
            const [dualWinner, setDualWinner] = useState(null);
            const [dualStatus, setDualStatus] = useState({
                redClicked: null,
                blueClicked: null,
                isLock: false,
                revealed: false // FIXED: New state to prevent showing answer on wrong guess
            });

            // Review Mode state
            const [reviewIndex, setReviewIndex] = useState(0);
            const [reviewWrongQuestions, setReviewWrongQuestions] = useState([]);
            const [reviewSelectedChoice, setReviewSelectedChoice] = useState(null);
            const [reviewAnswered, setReviewAnswered] = useState(false);
            const [showReviewExplainer, setShowReviewExplainer] = useState(false);
            const [reviewShowHint, setReviewShowHint] = useState(false);

            // Global 30-Second Countdown Timer
            const [timeLeft, setTimeLeft] = useState(30);

            // Master countdown effect
            useEffect(() => {
                if (view !== 'single' && view !== 'dual') return;
                if (timeLeft <= 0) {
                    handleGlobalTimeout();
                    return;
                }

                const timer = setTimeout(() => {
                    setTimeLeft(prev => prev - 1);
                }, 1000);

                return () => clearTimeout(timer);
            }, [timeLeft, view]);

            // --- CRITICAL REFACTOR: 100% Robust Home navigation reset ---
            const handleBackToMenu = (e) => {
                if (e) {
                    e.preventDefault();
                    e.stopPropagation();
                }
                
                // 1. Instantly transition view to prevent rendering sub-components under invalid states
                setView('menu');
                
                // 2. Safely clear all active play configurations
                setQuestionIndex(1);
                setSingleScore(0);
                setIsAnswered(false);
                setSelectedChoice(null);
                setStreak(0);
                setShowHint(false);
                setTotalAnswered(0);
                setCorrectCount(0);
                setDualScore(0);
                setDualRound(1);
                setDualWinner(null);
                setDualStatus({ redClicked: null, blueClicked: null, isLock: false, revealed: false });
                setTimeLeft(30);
                
                // 3. Reset review states
                setReviewIndex(0);
                setReviewSelectedChoice(null);
                setReviewAnswered(false);
                setShowReviewExplainer(false);
                setReviewShowHint(false);
            };

            // Initialize Single Player (30s Time-Attack)
            const startSinglePlayer = (modeType) => {
                setCurrentMode(modeType);
                setQuestionIndex(1);
                setSingleScore(0);
                setWrongQuestions([]);
                setStreak(0);
                setIsAnswered(false);
                setSelectedChoice(null);
                setTotalAnswered(0);
                setCorrectCount(0);
                setShowHint(false);
                setTimeLeft(30);
                
                const q = generateQuestion(modeType);
                setCurrentQuestion(q);
                setView('single');
            };

            // Initialize Dual Player (30s Time-Attack)
            const startDualPlayer = (modeType) => {
                setCurrentMode(modeType);
                setDualScore(0);
                setDualRound(1);
                setDualWinner(null);
                setDualStatus({ redClicked: null, blueClicked: null, isLock: false, revealed: false });
                setTimeLeft(30);
                
                const q = generateQuestion(modeType);
                setCurrentQuestion(q);
                setView('dual');
            };

            // Handle when global 30s timer hits 0
            const handleGlobalTimeout = () => {
                if (view === 'single') {
                    setView('single-ended');
                } else if (view === 'dual') {
                    if (dualScore > 0) concludeDualMatch('Red');
                    else if (dualScore < 0) concludeDualMatch('Blue');
                    else concludeDualMatch('Draw');
                }
            };

            // Single player choice action with auto-advance transition on correct
            const handleSingleChoice = (choice) => {
                if (isAnswered) return;
                setSelectedChoice(choice);
                setIsAnswered(true);
                setTotalAnswered(prev => prev + 1);

                const isCorrect = choice === currentQuestion.answer;
                if (isCorrect) {
                    setSingleScore(prev => prev + 10);
                    setStreak(prev => prev + 1);
                    setCorrectCount(prev => prev + 1);
                    
                    // Auto-advance after 0.5s if correct
                    setTimeout(() => {
                        advanceSinglePlayer();
                    }, 500);
                } else {
                    setWrongQuestions(prev => {
                        if (prev.some(q => q.expression === currentQuestion.expression)) return prev;
                        return [...prev, currentQuestion];
                    });
                    setStreak(0);
                }
            };

            // Draw next question in Single Player
            const advanceSinglePlayer = () => {

                                                        className={`text-2xl md:text-3xl lg:text-4xl font-black rounded-xl border-4 ${btnClass} transition-all active:translate-y-0.5 shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] flex justify-center items-center h-full min-h-[50px] md:min-h-[70px]`}
                                                    >
                                                        {opt}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>

                                </div>

                            </div>
                        )}

                        {/* --- SINGLE PLAYER END REPORT SCREEN --- */}
                        {view === 'single-ended' && (
                            <div className="max-w-md mx-auto w-full bg-white rounded-2xl border-4 border-black p-5 text-center shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] my-auto">
                                <SVG.Trophy />
                                <h2 className="text-2xl md:text-3xl font-black text-slate-800 mt-2 mb-1">單人挑戰時間到！</h2>
                                <p className="text-slate-500 font-bold text-xs mb-3">做得好！你在 30 秒內完成了以下成績：</p>
                                
                                <div className="bg-slate-50 rounded-xl border-2 border-slate-300 p-2.5 mb-3 text-sm">
                                    <div className="grid grid-cols-3 gap-1">
                                        <div className="text-center">
                                            <span className="block text-[10px] font-bold text-slate-400">最終得分</span>
                                            <span className="text-xl font-black text-blue-600">{singleScore}</span>
                                        </div>
                                        <div className="text-center border-l border-slate-200">
                                            <span className="block text-[10px] font-bold text-slate-400">答對題數</span>
                                            <span className="text-xl font-black text-emerald-600">{correctCount}/{totalAnswered}</span>
                                        </div>
                                        <div className="text-center border-l border-slate-200">
                                            <span className="block text-[10px] font-bold text-slate-400">收集錯題</span>
                                            <span className="text-xl font-black text-rose-600">{wrongQuestions.length}</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex flex-col gap-2.5">
                                    {wrongQuestions.length > 0 && (
                                        <button
                                            onClick={startReviewMode}
                                            className="w-full bg-yellow-400 hover:bg-yellow-500 text-slate-900 font-black py-2.5 rounded-xl border-2 border-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:translate-y-0.5 transition flex items-center justify-center gap-1.5 text-xs"
                                        >
                                            <SVG.Redo /> 重溫錯誤 ({wrongQuestions.length} 題)
                                        </button>
                                    )}
                                    <button
                                        onClick={() => startSinglePlayer(currentMode)}
                                        className="w-full bg-orange-500 hover:bg-orange-600 text-white font-black py-2.5 rounded-xl border-2 border-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:translate-y-0.5 transition text-xs"
                                    >
                                        重新作答
                                    </button>
                                    <button
                                        onClick={handleBackToMenu}
                                        className="w-full bg-slate-800 hover:bg-slate-900 text-white font-black py-2 rounded-xl border border-black active:translate-y-0.5 transition text-xs"
                                    >
                                        返回主選單
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* --- DUAL PLAYER END REPORT SCREEN --- */}
                        {view === 'dual-ended' && (
                            <div className="max-w-md mx-auto w-full bg-white rounded-xl border-4 border-black p-4 text-center shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] my-auto">
                                
                                <div className="transform scale-95 my-2 transition-transform duration-500">
                                    <TugOfWarSVG deltaScore={dualScore} />
                                </div>

                                <h2 className="text-lg md:text-2xl font-black mt-3 mb-0.5 tracking-tight">
                                    {dualWinner === 'Red' && <span className="text-red-600">🎉 紅方獲勝!</span>}
                                    {dualWinner === 'Blue' && <span className="text-blue-600">🎉 藍方獲勝!</span>}
                                    {dualWinner === 'Draw' && <span className="text-slate-600">🤝 雙方平手!</span>}
                                </h2>
                                
                                <p className="text-slate-500 font-bold text-xs mb-3">
                                    {dualWinner === 'Draw' ? "雙方平分秋色！再來一盤分出高下！" : "恭喜勝出！拉力拔河完美展現心算力！"}
                                </p>

                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 max-w-xs mx-auto">
                                    <button
                                        onClick={() => startDualPlayer(currentMode)}
                                        className="bg-indigo-600 hover:bg-indigo-700 text-white font-black py-2 rounded-lg border border-black shadow-[1px_1px_0px_0px_rgba(0,0,0,1)] active:translate-y-0.5 transition text-xs"
                                    >
                                        再來一局
                                    </button>
                                    <button
                                        onClick={handleBackToMenu}
                                        className="bg-slate-800 hover:bg-slate-900 text-white font-black py-2 rounded-lg border border-black active:translate-y-0.5 transition text-xs"
                                    >
                                        返回選單
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* --- REVIEW WRONG QUESTIONS STATE MACHINE --- */}
                        {view === 'review' && reviewWrongQuestions && reviewWrongQuestions.length > 0 && reviewWrongQuestions[reviewIndex] && (
                            <div className="max-w-md mx-auto w-full flex-1 flex flex-col justify-between py-1">
                                
                                {/* Top review status bar */}
                                <div className="flex justify-between items-center bg-yellow-400 text-slate-900 py-1.5 px-3 rounded-lg border border-black mb-2.5 shadow-sm">
                                    <div className="font-black text-xs">
                                        重溫錯題: <span className="text-rose-600">{reviewIndex + 1} / {reviewWrongQuestions.length}</span>
                                    </div>
                                    <div className="flex items-center gap-1">
                                        <span className="bg-white text-slate-900 font-extrabold text-[9px] px-2 py-0.2 rounded-full border border-black">
                                            重溫模式 🔄
                                        </span>
                                    </div>
                                    <button 
                                        onClick={() => setView('single-ended')}
                                        className="text-[9px] font-black bg-slate-950 hover:bg-slate-800 text-white px-2 py-0.5 rounded border border-black active:translate-y-0.5"
                                    >
                                        結束
                                    </button>
                                </div>

                                {/* Dynamic helper logic with hint toggle */}
                                <div className="mb-2.5">
                                    {reviewWrongQuestions[reviewIndex].type === 'octopus' ? (
                                        <VisualAid question={reviewWrongQuestions[reviewIndex]} showAnswer={reviewAnswered} />
                                    ) : (
                                        reviewShowHint ? (
                                            <div className="relative">
                                                <VisualAid question={reviewWrongQuestions[reviewIndex]} showAnswer={reviewAnswered} />
                                                <button 
                                                    onClick={() => setReviewShowHint(false)}
                                                    className="absolute top-1.5 right-1.5 bg-slate-800 text-white text-[9px] font-bold px-1.5 py-0.5 rounded hover:bg-slate-700 border border-slate-600"
                                                >
                                                    隱藏數線
                                                </button>
                                            </div>
                                        ) : (
                                            <div className="w-full bg-amber-50 border border-dashed border-amber-300 rounded-xl p-2.5 flex flex-col justify-center items-center h-[100px]">
                                                <p className="text-amber-800 font-bold text-[9px] mb-2">需要數線輔助思考嗎？</p>
                                                <button
                                                    onClick={() => setReviewShowHint(true)}
                                                    className="bg-amber-500 hover:bg-amber-600 text-white font-black py-1 px-3 rounded-md border border-black text-[9px] active:translate-y-0.5"
                                                >
                                                    顯示數線提示 ➔
                                                </button>
                                            </div>
                                        )
                                    )}
                                </div>

                                {/* Current formula */}
                                <div className="bg-white rounded-xl border-4 border-black p-2.5 text-center shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] mb-2.5">
                                    <p className="text-amber-600 font-black text-[10px] mb-0.5">重新挑戰此題</p>
                                    <h3 className="text-3xl font-black text-slate-800">
                                        {reviewWrongQuestions[reviewIndex].expression} = ?
                                    </h3>
                                </div>

                                {/* Multi-choice buttons */}
                                <div className="grid grid-cols-2 gap-2 mb-2.5">
                                    {reviewWrongQuestions[reviewIndex].options.map((opt, idx) => {
                                        const isCorrect = opt === reviewWrongQuestions[reviewIndex].answer;
                                        const isSelected = opt === reviewSelectedChoice;

                                        let btnStyle = "bg-white text-slate-800 border-slate-700 hover:bg-amber-50";

                                        if (reviewAnswered) {
                                            if (isCorrect) {
                                                btnStyle = "bg-green-500 text-white border-green-700 pointer-events-none";
                                            } else {
                                                btnStyle = "bg-slate-100 text-slate-400 border-slate-200 opacity-50 pointer-events-none";
                                            }
                                        } else if (reviewSelectedChoice !== null) {
                                            if (isSelected) {
                                                btnStyle = "bg-red-500 text-white border-red-700 animate-shake";
                                            }
                                        }

                                        return (
                                            <button
                                                key={idx}
                                                disabled={reviewAnswered || showReviewExplainer}
                                                onClick={() => handleReviewChoice(opt)}
                                                className={`text-xl md:text-3xl font-black py-2.5 rounded-xl border-4 ${btnStyle} shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:translate-y-0.5 transition-all flex justify-center items-center`}
                                            >
                                                {opt}
                                            </button>
                                        );
                                    })}
                                </div>

                                {/* Smart Explanation / Retry Action Box */}
                                {showReviewExplainer && (
                                    <div className="bg-red-50 rounded-lg border border-red-400 p-2 shadow-[1.5px_1.5px_0px_0px_rgba(239,68,68,1)] flex flex-col sm:flex-row justify-between items-center gap-1.5 animate-fade-in">
                                        <div className="text-left flex-1 text-[10px]">
                                            <span className="bg-red-100 text-red-800 text-[8px] font-black px-1.5 py-0.2 rounded border border-red-300 flex items-center gap-0.5 w-max">
                                                ❌ 再次答錯了
                                            </span>
                                            <p className="text-slate-800 font-extrabold mt-1">
                                                提示：同號加減要注意累積方向，異號則要注意正負化簡法則。
                                            </p>
                                        </div>
                                        <button
                                            onClick={retryCurrentReviewQuestion}
                                            className="w-full sm:w-auto bg-yellow-400 hover:bg-yellow-500 text-slate-950 font-black px-2.5 py-1.5 rounded-md border border-black shadow-[1px_1px_0px_0px_rgba(0,0,0,1)] active:translate-y-0.5 flex items-center justify-center gap-1 text-[9px]"
                                        >
                                            <SVG.Refresh /> 重新作答
                                        </button>
                                    </div>
                                )}

                                {reviewAnswered && (
                                    <div className="bg-emerald-50 rounded-lg border border-emerald-400 p-2 shadow-[1px_1px_0px_0px_rgba(16,185,129,1)] flex flex-col sm:flex-row justify-between items-center gap-1.5 animate-fade-in">
                                        <div className="text-left flex-1 text-[10px]">
                                            <span className="bg-green-100 text-green-800 text-[8px] font-black px-1.5 py-0.2 rounded border border-green-300 flex items-center gap-0.5 w-max">
                                                🎉 答對了！
                                            </span>
                                            <p className="text-slate-700 font-bold mt-1">
                                                {reviewWrongQuestions[reviewIndex].explanation}
                                            </p>
                                        </div>
                                        <button
                                            onClick={advanceReviewQuestion}
                                            className="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-black px-3 py-1 rounded-md border border-black shadow-[1px_1px_0px_0px_rgba(0,0,0,1)] active:translate-y-0.5 text-[9px]"
                                        >
                                            {reviewIndex + 1 >= reviewWrongQuestions.length ? "結束 ➔" : "下一題 ➔"}
                                        </button>
                                    </div>
                                )}

                            </div>
                        )}

                    </main>

                    {/* BRANDING BOTTOM FOOTER */}
                    <footer className="bg-slate-900 text-slate-400 text-[9px] py-1.5 text-center border-t border-black font-semibold mt-auto">
                        有向數加減學與教平台 © 2026 • 專為白板投影演示與行動裝置優化
                    </footer>
                </div>
            );
        }

        // Render Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
